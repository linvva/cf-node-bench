name: Release portable builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  WAILS_VERSION: "v2.13.0"

jobs:
  quality:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Go tests
        run: go test -tags webkit2_41 ./...

      - name: Run frontend tests
        run: pnpm test

      - name: Check frontend types
        run: pnpm typecheck

      - name: Install Playwright Chromium
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run browser tests
        run: pnpm test:e2e

  build:
    name: Build ${{ matrix.name }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows amd64
            id: windows-amd64
            os: windows-latest
            platform: windows/amd64
            output: CF-Node-Bench.exe
            suffix: windows-amd64.zip
          - name: Linux amd64
            id: linux-amd64
            os: ubuntu-24.04
            platform: linux/amd64
            output: CF-Node-Bench
            suffix: linux-amd64.tar.gz
          - name: macOS universal
            id: macos-universal
            os: macos-latest
            platform: darwin/universal
            output: CF-Node-Bench
            suffix: macos-universal.zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build Linux application
        if: runner.os == 'Linux'
        run: wails build -clean -trimpath -platform "${{ matrix.platform }}" -tags webkit2_41 -o "${{ matrix.output }}"

      - name: Build application
        if: runner.os != 'Linux'
        run: wails build -clean -trimpath -platform "${{ matrix.platform }}" -o "${{ matrix.output }}"

      - name: Package Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = "release/CF-Node-Bench-$env:GITHUB_REF_NAME-windows-amd64"
          $archive = "$package.zip"
          New-Item -ItemType Directory -Force -Path $package | Out-Null
          Copy-Item "build/bin/CF-Node-Bench.exe" "$package/CF-Node-Bench.exe"
          Copy-Item "frontend/public/THIRD_PARTY_NOTICES.md" $package
          Copy-Item "frontend/public/licenses" "$package/licenses" -Recurse
          Compress-Archive -Path $package -DestinationPath $archive

      - name: Package Linux application
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package="release/CF-Node-Bench-${GITHUB_REF_NAME}-linux-amd64"
          mkdir -p "$package"
          install -m 755 "build/bin/CF-Node-Bench" "$package/CF-Node-Bench"
          cp "frontend/public/THIRD_PARTY_NOTICES.md" "$package/"
          cp -R "frontend/public/licenses" "$package/licenses"
          tar -C release -czf "${package}.tar.gz" "$(basename "$package")"

      - name: Package macOS application
        if: runner.os == 'macOS'
        shell: bash
        run: |
          package="release/CF-Node-Bench-${GITHUB_REF_NAME}-macos-universal"
          mkdir -p "$package"
          cp -R "build/bin/CF-Node-Bench.app" "$package/"
          cp "frontend/public/THIRD_PARTY_NOTICES.md" "$package/"
          cp -R "frontend/public/licenses" "$package/licenses"
          ditto -c -k --sequesterRsrc --keepParent "$package" "${package}.zip"

      - name: Upload portable archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.id }}
          path: release/CF-Node-Bench-${{ github.ref_name }}-${{ matrix.suffix }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download portable archives
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA-256 checksums
        working-directory: release-artifacts
        run: sha256sum CF-Node-Bench-* > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
